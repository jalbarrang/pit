name: release
run-name: "release ${{ github.event_name == 'schedule' && 'nightly' || inputs.channel }}${{ inputs.version && format(' {0}', inputs.version) || '' }}${{ inputs.channel == 'stable' && !inputs.version && format(' ({0})', inputs.bump) || '' }}"

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - nightly
      bump:
        description: "Stable version bump"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      version:
        description: "Stable version override X.Y.Z (optional, wins over bump)"
        required: false
        type: string
  schedule:
    - cron: "0 6 * * *" # daily nightly check, 06:00 UTC

concurrency: release

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: github.repository == 'jalbarrang/pit'
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      proceed: ${{ steps.changes.outputs.proceed }}
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine channel
        id: channel
        env:
          DISPATCH_CHANNEL: ${{ inputs.channel }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          channel="${DISPATCH_CHANNEL:-stable}"
          if [[ "$channel" == "stable" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Stable releases must be dispatched from main (got $GITHUB_REF)." >&2
            exit 1
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Check for changes since last nightly
        id: changes
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          if [[ "$CHANNEL" != "nightly" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          last_tag=$(git tag --list 'v*-nightly.*' --sort=-creatordate | head -n 1)
          if [[ -z "$last_tag" ]]; then
            echo "No previous nightly tag. Proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$(git rev-parse "$last_tag^{commit}")" == "$(git rev-parse HEAD)" ]]; then
            echo "No changes since $last_tag. Skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes since $last_tag. Proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: resolve
        if: steps.changes.outputs.proceed == 'true'
        env:
          CHANNEL: ${{ steps.channel.outputs.channel }}
          BUMP: ${{ inputs.bump }}
          VERSION_OVERRIDE: ${{ inputs.version }}
        run: |
          if [[ "$CHANNEL" == "nightly" ]]; then
            node scripts/release-version.mjs nightly \
              --date "$(date -u +%Y%m%d)" \
              --run "$GITHUB_RUN_NUMBER"
          elif [[ -n "$VERSION_OVERRIDE" ]]; then
            node scripts/release-version.mjs stable --version "$VERSION_OVERRIDE"
          else
            node scripts/release-version.mjs stable --bump "${BUMP:-patch}"
          fi

  gate:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install hiker
        uses: jalbarrang/hiker@v0.1.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build-binaries:
    needs: [preflight, gate]
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install cross-platform OpenTUI packages
        run: bun install --os="*" --cpu="*" @opentui/core@0.4.3

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build binary assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          CHANNEL: ${{ needs.preflight.outputs.channel }}
        run: |
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            bun scripts/build-binary.ts --target "$target" --version "$VERSION" --channel "$CHANNEL"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: pit-binaries
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    needs: [preflight, gate, build-binaries]
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ needs.preflight.outputs.channel }}
      VERSION: ${{ needs.preflight.outputs.version }}
      TAG: ${{ needs.preflight.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - uses: actions/download-artifact@v4
        with:
          name: pit-binaries
          path: dist

      - name: Setup git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions and tag (stable)
        if: env.CHANNEL == 'stable'
        run: |
          node scripts/release-version.mjs stable --version "$VERSION" --write
          git add package.json packages/app/package.json packages/tui/package.json
          git commit -m "release: $TAG"
          git tag "$TAG"
          git push origin main "$TAG"

      - name: Create source tarball
        run: |
          if [[ "$CHANNEL" == "stable" ]]; then
            target="$TAG"
          else
            target="$GITHUB_SHA"
          fi
          git archive --format=tar.gz --prefix="pit-$VERSION/" -o "pit-$VERSION.tar.gz" "$target"

      - name: Publish GitHub Release
        run: |
          if [[ "$CHANNEL" == "stable" ]]; then
            prev_tag=$(git tag --list 'v*' --sort=-creatordate | grep -v -- '-nightly\.' | grep -vx "$TAG" | head -n 1 || true)
            flags=(--verify-tag --latest)
          else
            prev_tag=$(git tag --list 'v*-nightly.*' --sort=-creatordate | head -n 1 || true)
            flags=(--target "$GITHUB_SHA" --prerelease --latest=false)
          fi
          notes_flags=(--generate-notes)
          if [[ -n "$prev_tag" ]]; then
            notes_flags+=(--notes-start-tag "$prev_tag")
          fi
          gh release create "$TAG" "pit-$VERSION.tar.gz" dist/*.tar.gz dist/*.sha256 \
            --title "$TAG" \
            "${notes_flags[@]}" "${flags[@]}"
